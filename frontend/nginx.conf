server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Spring Boot
    location /TradeX/api/ {
        proxy_pass http://backend-springboot:8080/TradeX/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket (STOMP) to Spring Boot
    location /TradeX/ws {
        proxy_pass http://backend-springboot:8080/TradeX/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Proxy to Node.js Yahoo Finance service
    location /yahoo/ {
        proxy_pass http://backend-node:5002/;
        proxy_set_header Host $host;
    }
}
